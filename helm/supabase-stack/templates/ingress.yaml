{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-supabase-ingress
  namespace: {{ .Release.Namespace }}
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          # Studio UI
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-supabase-studio
                port:
                  number: 3000
          # Kong API Gateway — all API traffic
          - path: /rest/v1
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-supabase-kong
                port:
                  number: 8000
          - path: /auth/v1
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-supabase-kong
                port:
                  number: 8000
          - path: /storage/v1
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-supabase-kong
                port:
                  number: 8000
          - path: /realtime/v1
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-supabase-kong
                port:
                  number: 8000
          - path: /functions/v1
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-supabase-kong
                port:
                  number: 8000
{{- end }}
