# Realtime
# Receives from Kong only
# Sends to Postgres only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: realtime-network-policy
  namespace: supabase
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: supabase-realtime
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: supabase-kong
      ports:
        - port: 4000
  egress:
    - ports:
        - port: 5432 # Postgres
        - port: 53   # DNS
          protocol: UDP
