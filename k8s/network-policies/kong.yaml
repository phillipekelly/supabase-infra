# Kong - API Gateway
# Receives from internet, sends to all internal services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kong-network-policy
  namespace: supabase
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: supabase-kong
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - {} # Allow from anywhere (internet traffic)
  egress:
    - {} # Allow to all services
